<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Dashboard - MyClaimAssist</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Modern Dark Mode Palette with Gold Accents */
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --primary-gold: #D4AF37;
            --amber-glow: #FFBF00;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --border: #333333;
            --shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 2.5rem;
            color: var(--primary-gold);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            max-width: 1100px;
            width: 90%;
        }

        .campaign-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .campaign-card:hover {
            transform: translateY(-10px);
            border-color: var(--amber-glow);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
            background: #252525;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            color: var(--primary-gold);
            font-size: 2rem;
            border: 2px solid var(--border);
        }

        .campaign-card h2 {
            margin: 10px 0;
            font-size: 1.5rem;
            color: #ffffff;
        }

        .campaign-card p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .launch-btn {
            background: var(--primary-gold);
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: background 0.3s;
        }

        .campaign-card:hover .launch-btn {
            background: var(--amber-glow);
            box-shadow: 0 0 15px rgba(255, 191, 0, 0.4);
        }

        /* Responsive Settings */
        @media (max-width: 850px) {
            .dashboard-container { grid-template-columns: 1fr; }
            body { height: auto; padding: 50px 0; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Campaign Selector</h1>
        <p>Please select the active portal for your current session</p>
    </div>

    <div class="dashboard-container">
        <div class="campaign-card" onclick="window.location.href='dashboard.html'">
            <div class="icon-circle">🚗</div>
            <h2>MCA Portal</h2>
            <button class="launch-btn">Launch Portal</button>
        </div>

        <div class="campaign-card" onclick="window.location.href='debt.html'">
            <div class="icon-circle">💰</div>
            <h2>DEBT Portal</h2>
            <button class="launch-btn">Launch Portal</button>
        </div>

        <div class="campaign-card" onclick="window.location.href='plum.html'">
            <div class="icon-circle">🏥</div>
            <h2>PLUM Portal</h2>
            <button class="launch-btn">Launch Portal</button>
        </div>
    </div>

</body>
</html>
