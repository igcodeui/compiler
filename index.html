<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Campaign Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --bg-base: #020617;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-primary: #38bdf8;
            --accent-secondary: #818cf8;
            --danger: #fb7185;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            padding: 50px 20px;
        }

        /* Ambient Background Glows */
        .ambient-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.4;
            pointer-events: none;
        }

        .glow-1 {
            top: -10%;
            left: -5%;
            width: 500px;
            height: 500px;
            background: var(--accent-secondary);
        }

        .glow-2 {
            bottom: -20%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: var(--accent-primary);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Header Section */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
            padding: 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .header-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .badge {
            align-self: flex-start;
            background: linear-gradient(135deg, rgba(129, 140, 248, 0.2), rgba(56, 189, 248, 0.2));
            color: var(--accent-primary);
            border: 1px solid rgba(56, 189, 248, 0.3);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .add-btn {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: #fff;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px -10px rgba(56, 189, 248, 0.5);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -10px rgba(56, 189, 248, 0.7);
        }

        /* Grid & Cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%);
            opacity: 0;
            transition: 0.4s;
            pointer-events: none;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5), 
                        0 0 20px -5px rgba(56, 189, 248, 0.15);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .card-icon {
            font-size: 28px;
            background: rgba(255, 255, 255, 0.05);
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .card-file {
            font-size: 13px;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 10px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .card-action {
            margin-top: auto;
            color: var(--accent-primary);
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.8;
            transition: 0.3s;
        }

        .card:hover .card-action {
            opacity: 1;
            gap: 12px; /* Slight movement arrow effect */
        }

        /* Delete Button */
        .delete-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: 0.2s;
            opacity: 0;
            z-index: 10;
        }

        .card:hover .delete-btn {
            opacity: 0.5;
        }

        .delete-btn:hover {
            opacity: 1 !important;
            background: rgba(251, 113, 133, 0.15);
            color: var(--danger);
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }
            .add-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- Ambient Glows -->
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <div class="container">
        <header class="header">
            <div class="header-content">
                <span class="badge">Master Hub</span>
                <div class="title">Campaign Launcher</div>
            </div>
            <button class="add-btn" onclick="addNewScript()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                Deploy New Script
            </button>
        </header>

        <div class="grid" id="dashboardGrid">
            <!-- Cards will be generated here by JavaScript -->
        </div>
    </div>

    <script>
        const defaultScripts = [
            { id: "1", name: "CCM Final Expense", file: "CCM-FE.html", icon: "📑" },
            { id: "2", name: "CCM Medicare", file: "CCM-MEDICARE.html", icon: "🩺" },
            { id: "3", name: "CCM Med Ret", file: "CCMMEDRET.html", icon: "🔄" },
            { id: "4", name: "CCM Med Callback", file: "CCMMEDCALLBACK.html", icon: "📞" },
            { id: "5", name: "MVA Intake", file: "MVA.html", icon: "🚗" },
            { id: "6", name: "Plum Winback", file: "plumwinback.html", icon: "🎯" },
            { id: "7", name: "Plum Standard", file: "plum.html", icon: "🟣" }
        ];

        let myScripts = [];

        function loadDashboard() {
            const savedScripts = localStorage.getItem('agentScriptsV2');
            if (savedScripts) {
                myScripts = JSON.parse(savedScripts);
            } else {
                myScripts = [...defaultScripts];
                saveToStorage();
            }
            renderCards();
        }

        function renderCards() {
            const grid = document.getElementById('dashboardGrid');
            grid.innerHTML = ''; 

            myScripts.forEach((script) => {
                const card = document.createElement('a');
                card.href = script.file;
                card.target = "_blank"; 
                card.className = 'card';
                
                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-icon">${script.icon || '📄'}</div>
                    </div>
                    <div class="card-title">${script.name}</div>
                    <div class="card-file">${script.file}</div>
                    <div class="card-action">Launch Engine →</div>
                `;

                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.innerHTML = '✕';
                delBtn.title = "Remove campaign";
                delBtn.onclick = (e) => {
                    e.preventDefault(); 
                    deleteScript(script.id);
                };
                
                card.querySelector('.card-header').appendChild(delBtn);
                grid.appendChild(card);
            });
        }

        function addNewScript() {
            const name = prompt("Enter the Campaign Name:\n(e.g., 'New Health Campaign')");
            if (!name) return;

            const filename = prompt("Enter the exact HTML file name:\n(e.g., 'health-script.html')");
            if (!filename) return;

            const newScript = {
                id: Date.now().toString(),
                name: name,
                file: filename,
                icon: "🌟" 
            };

            myScripts.push(newScript);
            saveToStorage();
            renderCards();
        }

        function deleteScript(id) {
            if(confirm("Are you sure you want to remove this campaign from the dashboard?")) {
                myScripts = myScripts.filter(script => script.id !== id);
                saveToStorage();
                renderCards();
            }
        }

        function saveToStorage() {
            localStorage.setItem('agentScriptsV2', JSON.stringify(myScripts));
        }

        window.onload = loadDashboard;
    </script>
</body>
</html>
